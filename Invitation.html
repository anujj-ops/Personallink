/* ============================ STYLES =================================== */

const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Great+Vibes&family=Nunito+Sans:wght@300;400;600;700&display=swap');

.wedding-root *{box-sizing:border-box;margin:0;padding:0;}
.wedding-root{
  --ivory:${TOKENS.ivory};--paper:${TOKENS.paper};--paperDeep:${TOKENS.paperDeep};
  --forest:${TOKENS.forest};--moss:${TOKENS.moss};--earth:${TOKENS.earth};
  --charcoal:${TOKENS.charcoal};--gold:${TOKENS.gold};
  --night-top:${TOKENS.nightTop};--night-mid:${TOKENS.nightMid};
  font-family:'Nunito Sans',system-ui,sans-serif;
  color:var(--charcoal);background:var(--ivory);
  -webkit-font-smoothing:antialiased;overflow-x:hidden;line-height:1.5;
}
.wedding-root main{display:block;}

.display-lg,.display-md,.display-sm,.names,.ms-title{
  font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;
  letter-spacing:.01em;line-height:1.08;
}
.display-lg{font-size:clamp(2.1rem,7vw,4.2rem);}
.display-md{font-size:clamp(1.8rem,5vw,3rem);}
.display-sm{font-size:clamp(1.5rem,4vw,2.2rem);}
.script,.script-sm,.amp{font-family:'Great Vibes',cursive;font-weight:400;}
.script{font-size:clamp(1.6rem,4.5vw,2.4rem);color:var(--earth);}
.script-sm{font-size:clamp(1.2rem,3.5vw,1.7rem);color:var(--moss);}

.eyebrow{
  font-family:'Nunito Sans',sans-serif;font-weight:600;
  text-transform:uppercase;letter-spacing:.32em;font-size:.72rem;
  color:var(--moss);line-height:1.7;
}
.eyebrow.center{text-align:center;}

.sec{
  position:relative;z-index:2;
  padding:clamp(4rem,11vw,8.5rem) clamp(1.3rem,6vw,3rem);
  max-width:1080px;margin:0 auto;text-align:center;
}

/* ---------- reveal ---------- */
.reveal{opacity:0;transform:translateY(26px);
  transition:opacity .9s ease,transform .9s cubic-bezier(.16,.7,.3,1);}
.reveal.in{opacity:1;transform:none;}
@media (prefers-reduced-motion:reduce){
  .reveal{opacity:1;transform:none;transition:none;}
  .reveal-seq{animation:none!important;opacity:1!important;transform:none!important;}
}

/* ---------- scroll-linked motion ---------- */
.progress-trail{position:fixed;top:0;left:0;right:0;height:2px;z-index:90;transform-origin:left center;
  transform:scaleX(var(--sp,0));
  background:linear-gradient(90deg,var(--moss),var(--gold));opacity:.85;}
.opening .mtn-wrap{transform:translate3d(0,calc(0.14px * var(--sy,0)),0);will-change:transform;}
.opening .sky-night{transform:translate3d(0,calc(0.06px * var(--sy,0)),0);}
.opening-content{will-change:transform;}
@media (prefers-reduced-motion:reduce){
  .opening .mtn-wrap,.opening .sky-night{transform:none!important;}
}

/* ---------- backdrop / scenery ---------- */
.mtn-wrap{position:absolute;left:0;right:0;bottom:0;height:min(48vh,420px);z-index:1;pointer-events:none;}
.mtn{width:100%;height:100%;display:block;}
.pines{position:absolute;bottom:0;left:0;width:100%;height:70px;z-index:2;opacity:.9;}
.pine{animation:sway 7s ease-in-out infinite;}
@keyframes sway{0%,100%{transform:rotate(-1.2deg);}50%{transform:rotate(1.2deg);}}
.botanical{width:220px;height:36px;margin:1.4rem auto 0;display:block;}

/* ---------- OPENING ---------- */
.opening{position:relative;min-height:100svh;display:flex;align-items:center;justify-content:center;
  overflow:hidden;text-align:center;
  background:linear-gradient(180deg,var(--night-top) 0%,var(--night-mid) 62%,#26313a 100%);}
.sky-night{position:absolute;inset:0;z-index:0;}
.stars{position:absolute;inset:0;}
.stars span{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;opacity:.75;
  animation:twinkle 3.4s ease-in-out infinite;}
.stars.soft span{opacity:.5;}
@keyframes twinkle{0%,100%{opacity:.15;transform:scale(.7);}50%{opacity:.9;transform:scale(1);}}
.cloud{position:absolute;width:52vw;max-width:520px;height:120px;border-radius:50%;
  background:radial-gradient(ellipse at center,rgba(180,190,200,.16),transparent 70%);filter:blur(8px);}
.cloud.c1{top:16%;left:-20%;animation:drift 46s linear infinite;}
.cloud.c2{top:30%;left:-40%;animation:drift 64s linear infinite;animation-delay:-20s;}
.cloud.warm{background:radial-gradient(ellipse at center,rgba(200,160,110,.2),transparent 70%);}
@keyframes drift{from{transform:translateX(0);}to{transform:translateX(160vw);}}
.mist{position:absolute;left:-10%;right:-10%;height:120px;filter:blur(14px);
  background:linear-gradient(90deg,transparent,rgba(220,225,225,.14),transparent);}
.mist-a{bottom:26%;animation:mist 30s ease-in-out infinite;}
.mist-b{bottom:14%;animation:mist 40s ease-in-out infinite reverse;}
@keyframes mist{0%,100%{transform:translateX(-6%);opacity:.5;}50%{transform:translateX(6%);opacity:.85;}}

.opening-content{position:relative;z-index:5;color:var(--ivory);padding:2rem 1.4rem;max-width:760px;}
.opening-content .script-sm{color:#cdd6c8;}
.names{display:flex;flex-direction:column;align-items:center;gap:.12em;margin:.7rem 0 1.2rem;
  font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:clamp(2.8rem,11vw,5.4rem);
  line-height:1.02;letter-spacing:.015em;color:var(--ivory);}
.names .amp{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.52em;
  color:rgba(245,239,227,.75);line-height:1;}
.title-rise{display:flex;flex-direction:column;align-items:center;}
.mr{display:block;overflow:hidden;padding:.18em .08em;margin:-.14em 0;}
.mr>span{display:block;transform:translateY(120%);opacity:0;
  animation:rise 1.15s cubic-bezier(.16,.72,.24,1) forwards;}
.opening-content .display-lg{color:var(--ivory);margin-bottom:.7rem;font-weight:400;}
.opening-content .sub{font-size:.95rem;letter-spacing:.04em;color:#d7ddd2;margin-bottom:1.6rem;}
.meta{letter-spacing:.34em;font-size:.78rem;color:#e6e2d5;text-transform:uppercase;font-weight:600;}
.meta-place{letter-spacing:.34em;font-size:.68rem;color:var(--gold);text-transform:uppercase;margin-top:.35rem;}
.begin{margin-top:2.4rem;background:none;border:1px solid rgba(230,226,213,.4);color:var(--ivory);
  font-family:'Nunito Sans',sans-serif;font-size:.72rem;letter-spacing:.24em;text-transform:uppercase;
  padding:.85rem 1.5rem;border-radius:40px;cursor:pointer;transition:.4s;display:inline-flex;gap:.6rem;align-items:center;}
.begin:hover{background:rgba(230,226,213,.1);border-color:rgba(230,226,213,.7);}
.begin .arrow{animation:bob 1.8s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(5px);}}

/* staged entrance */
.reveal-seq{opacity:0;animation:seq 1.1s cubic-bezier(.16,.7,.3,1) forwards;}
.reveal-seq.s1{animation-delay:.4s;}
.reveal-seq.s5{animation-delay:2.5s;}
.reveal-seq.s6{animation-delay:2.9s;}
.reveal-seq.s7{animation-delay:3.3s;}
.mr.s2>span{animation-delay:.8s;}
.mr.s3>span{animation-delay:1.0s;}
.mr.s3b>span{animation-delay:1.2s;}
.mr.s4>span{animation-delay:1.7s;}
.mr.s4b>span{animation-delay:1.9s;}
@keyframes seq{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:none;}}
@keyframes rise{from{transform:translateY(120%);opacity:0;}to{transform:translateY(0);opacity:1;}}
@media (prefers-reduced-motion:reduce){
  .mr>span{transform:none!important;opacity:1!important;animation:none!important;}
}

/* ---------- daylight body ---------- */
.daylight-bg{position:relative;background:var(--ivory);}
.daylight-bg::before{content:"";position:absolute;top:0;left:0;right:0;height:200px;
  background:linear-gradient(180deg,#1a2229,#3f4a44 45%,var(--ivory));pointer-events:none;}

/* ---------- FAMILY ---------- */
.family .eyebrow{display:block;margin-bottom:2rem;}
.family-names{display:flex;flex-direction:column;align-items:center;gap:.8rem;}
.fam-sub{color:var(--earth);font-size:.9rem;letter-spacing:.04em;margin-top:.3rem;}
.fam-amp .script{font-size:2.8rem;color:var(--moss);}
.family-body{max-width:560px;margin:1.8rem auto 0;color:var(--charcoal);
  font-family:'Cormorant Garamond',serif;font-size:clamp(1.15rem,2.6vw,1.5rem);font-style:italic;line-height:1.6;opacity:.92;}

/* ---------- STORY ---------- */
.story-intro{margin-top:1.6rem;color:var(--earth);}
.story-intro-sub{margin-top:.6rem;color:var(--moss);font-size:1.05rem;letter-spacing:.02em;}
.trail{position:relative;max-width:640px;margin:3rem auto 0;padding:1rem 0;}
.trail-line{position:absolute;top:0;left:50%;transform:translateX(-50%);width:60px;height:100%;z-index:0;}
.trail-draw{stroke-dasharray:1;stroke-dashoffset:1;transition:stroke-dashoffset 2.6s cubic-bezier(.4,0,.2,1);}
.trail-line.drawn .trail-draw{stroke-dashoffset:0;}
@media (prefers-reduced-motion:reduce){.trail-draw{transition:none;stroke-dashoffset:0;}}
.milestone{position:relative;z-index:1;width:50%;padding:1.6rem 1.6rem;text-align:left;}
.milestone.left{margin-right:auto;text-align:right;padding-right:2.4rem;}
.milestone.right{margin-left:auto;padding-left:2.4rem;}
.milestone .dot{position:absolute;top:1.9rem;width:12px;height:12px;border-radius:50%;
  background:var(--ivory);border:2px solid var(--moss);box-shadow:0 0 0 4px rgba(122,133,95,.15);}
.milestone.left .dot{right:-6px;}
.milestone.right .dot{left:-6px;}
.ms-title{font-size:clamp(1.35rem,3.6vw,1.9rem);color:var(--forest);}
.ms-body{margin-top:.35rem;color:var(--earth);font-size:.98rem;line-height:1.5;}
@media(max-width:640px){
  .trail-line{left:16px;transform:none;}
  .milestone,.milestone.left,.milestone.right{width:100%;text-align:left;padding:1.3rem 0 1.3rem 2.4rem;margin:0;}
  .milestone.left .dot,.milestone.right .dot{left:10px;right:auto;}
}

/* ---------- COUNTDOWN ---------- */
.countdown-sec{padding-top:2rem;}
.cd .eyebrow{display:block;margin-bottom:2rem;}
.cd-row{display:flex;align-items:flex-start;justify-content:center;gap:clamp(.6rem,3.5vw,1.8rem);flex-wrap:nowrap;}
.cd-cell{display:flex;flex-direction:column;gap:.45rem;min-width:0;}
.cd-sep{width:1px;align-self:stretch;background:linear-gradient(180deg,transparent,rgba(107,90,65,.4),transparent);margin-top:.3rem;}
.cd-num{font-family:'Cormorant Garamond',serif;font-size:clamp(2.4rem,11vw,4.4rem);color:var(--forest);
  line-height:.9;font-weight:500;font-variant-numeric:tabular-nums;}
.cd-lbl{font-size:.58rem;letter-spacing:.24em;text-transform:uppercase;color:var(--moss);}
.cd-begun{text-align:center;}
.cd-begun .display-md{color:var(--forest);margin-top:.4rem;}

/* ---------- EVENTS (full-bleed editorial spreads) ---------- */
.events{position:relative;}
.events-intro{padding:clamp(3.5rem,9vw,6rem) 1.3rem 1.5rem;text-align:center;}
.events-intro .eyebrow{display:block;}
.event{position:relative;overflow:hidden;text-align:center;
  padding:clamp(3.5rem,9vw,6rem) clamp(1.3rem,6vw,3rem) clamp(9rem,20vw,13rem);}
.ev-day{background:linear-gradient(180deg,#f4edda 0%,#f1e4c4 58%,#ecdcae 100%);color:var(--charcoal);}
.ev-dusk{background:linear-gradient(180deg,#0f1920 0%,#172631 55%,#213540 100%);color:#ece5d4;}
.ev-bright{background:linear-gradient(180deg,#cfe0ea 0%,#e2ecdf 46%,#f3ecdc 100%);color:var(--charcoal);}
.ev-atmos{position:absolute;inset:0;z-index:0;pointer-events:none;}
.event .mtn-wrap{height:min(40vh,320px);}
.ev-body{position:relative;z-index:2;max-width:640px;margin:0 auto;display:flex;flex-direction:column;align-items:center;}
.ev-num{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(5rem,24vw,12rem);
  line-height:.7;opacity:.1;margin-bottom:-.26em;letter-spacing:.02em;}
.ev-dusk .ev-num{opacity:.16;color:#fff;}
.ev-kicker{font-size:.64rem;letter-spacing:.3em;text-transform:uppercase;font-weight:600;opacity:.68;margin-bottom:.5rem;}
.ev-name{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(2.4rem,8vw,4rem);line-height:1;}
.ev-when{margin-top:1rem;font-size:.9rem;letter-spacing:.05em;opacity:.85;}
.ev-time{margin-top:.25rem;font-weight:700;letter-spacing:.14em;font-size:1.05rem;}
.ev-rule{display:block;width:38px;height:1px;background:currentColor;opacity:.4;margin:1.4rem auto;}
.ev-line{opacity:.95;}
.ev-day .ev-line{color:#9a7628;}
.ev-dusk .ev-line{color:#ecdca6;}
.ev-bright .ev-line{color:var(--earth);}
/* atmosphere helpers (shared) */
.sun{position:absolute;top:34px;right:12%;width:64px;height:64px;border-radius:50%;
  background:radial-gradient(circle,#f6d27a,#e7b657);box-shadow:0 0 52px 16px rgba(240,200,110,.45);
  animation:pulse 6s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.92;}50%{transform:scale(1.06);opacity:1;}}
.ridge-glow{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 120%,rgba(255,255,255,.5),transparent 62%);}
.mini-stars span{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;animation:twinkle 3s ease-in-out infinite;}
.string-lights{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-around;padding:0 6%;z-index:3;}
.string-lights i{width:6px;height:6px;border-radius:50%;background:#f4d58a;box-shadow:0 0 9px 2px rgba(244,213,138,.8);
  transform:translateY(var(--dip,10px));animation:glow 2.4s ease-in-out infinite;}
.string-lights i:nth-child(even){--dip:20px;}
@keyframes glow{0%,100%{opacity:.4;}50%{opacity:1;}}
.events-foot{background:var(--ivory);text-align:center;
  padding:clamp(3rem,8vw,5rem) 1.3rem clamp(1rem,4vw,2rem);}
.farewell{margin-bottom:2.4rem;}
.farewell .display-sm{color:var(--forest);}
.farewell .ev-time{color:var(--charcoal);}
.btn-cal{margin-top:.4rem;}

/* ---------- buttons ---------- */
.btn{display:inline-block;font-family:'Nunito Sans',sans-serif;font-weight:600;font-size:.8rem;
  letter-spacing:.16em;text-transform:uppercase;padding:.95rem 1.8rem;border-radius:44px;
  cursor:pointer;border:1px solid transparent;transition:.35s;text-decoration:none;}
.btn-primary{background:var(--forest);color:var(--ivory);}
.btn-primary:hover{background:#1f2b1e;transform:translateY(-2px);box-shadow:0 10px 24px rgba(44,58,43,.25);}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-ghost{background:transparent;color:var(--forest);border-color:var(--forest);}
.btn-ghost:hover{background:rgba(44,58,43,.06);}
.center{text-align:center;}

/* ---------- RSVP ---------- */
.rsvp .eyebrow{display:block;margin-bottom:1rem;}
.rsvp-lead{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.35rem;color:var(--earth);margin-bottom:2rem;}

  border-radius:18px;padding:1.8rem clamp(1.2rem,4vw,2rem);box-shadow:0 10px 30px rgba(44,58,43,.08);}
.rsvp-fields{display:flex;flex-direction:column;gap:1rem;text-align:left;}

  background:var(--ivory);font-size:1rem;font-family:'Nunito Sans',sans-serif;color:var(--charcoal);}
.fld input:focus{outline:2px solid var(--moss);outline-offset:1px;border-color:var(--moss);}
.rsvp-hint{font-size:.82rem;color:var(--earth);margin:1rem 0 1.4rem;line-height:1.5;}
.rsvp-actions{display:flex;flex-wrap:wrap;gap:.8rem;justify-content:center;}
.rsvp-phone{margin-top:1.2rem;letter-spacing:.14em;color:var(--moss);font-size:.85rem;}

/* ---------- LOCATION / ECO ---------- */
.venue-card{max-width:480px;margin:1rem auto 0;padding:2rem;background:var(--paper);
  border:1px solid rgba(107,90,65,.16);border-radius:18px;box-shadow:0 10px 30px rgba(44,58,43,.08);}
.venue-card .display-md{color:var(--forest);}
.venue-sub{color:var(--earth);margin:.4rem 0 1.6rem;letter-spacing:.04em;}
.map-note{margin-top:.9rem;font-size:.78rem;color:var(--moss);}
.map-note code{background:rgba(122,133,95,.15);padding:.1rem .4rem;border-radius:5px;font-size:.74rem;}
.eco-body{max-width:520px;margin:1.4rem auto 0;font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(1.2rem,3vw,1.55rem);line-height:1.7;color:var(--earth);}

/* ---------- FINALE ---------- */
.finale{position:relative;min-height:92svh;display:flex;align-items:center;justify-content:center;
  overflow:hidden;text-align:center;
  background:linear-gradient(180deg,#efe6d3 0%,#c99f6e 26%,#6d5b4b 62%,var(--night-mid) 100%);}
.finale-sky{position:absolute;inset:0;z-index:0;}
.finale-content{position:relative;z-index:5;color:var(--ivory);padding:2.4rem 1.4rem;max-width:680px;}
.finale-lines{font-family:'Cormorant Garamond',serif;font-size:clamp(1.5rem,4.4vw,2.4rem);
  line-height:1.4;font-weight:400;text-shadow:0 2px 20px rgba(0,0,0,.4);}

  font-size:clamp(2.2rem,8vw,3.4rem);letter-spacing:.03em;color:var(--ivory);}
.finale-date{margin-top:.5rem;letter-spacing:.3em;font-size:.78rem;text-transform:uppercase;color:#f0ead9;}
.finale-venue{margin-top:.4rem;letter-spacing:.2em;font-size:.68rem;text-transform:uppercase;color:var(--gold);}
.finale-see{margin-top:2rem;font-family:'Great Vibes',cursive;font-size:clamp(1.6rem,5vw,2.2rem);color:#f4ead6;}

/* ---------- MUSIC ---------- */
.music{position:fixed;right:16px;bottom:16px;z-index:60;}
.music-btn{display:inline-flex;align-items:center;gap:.55rem;background:rgba(35,36,32,.82);
  color:var(--ivory);border:1px solid rgba(230,226,213,.25);border-radius:40px;
  padding:.6rem .95rem;cursor:pointer;font-family:'Nunito Sans',sans-serif;font-size:.62rem;
  letter-spacing:.18em;text-transform:uppercase;backdrop-filter:blur(6px);transition:.35s;}
.music-btn:hover{background:rgba(44,58,43,.92);}
.music-btn.on{border-color:var(--gold);}
.music-label{white-space:nowrap;}
.eq{display:inline-flex;align-items:flex-end;gap:2px;height:12px;}
.eq i{width:2px;height:4px;background:var(--gold);border-radius:2px;}
.eq.live i{animation:eq 900ms ease-in-out infinite;}
.eq.live i:nth-child(2){animation-delay:.2s;}
.eq.live i:nth-child(3){animation-delay:.4s;}
@keyframes eq{0%,100%{height:3px;}50%{height:12px;}}
@media(max-width:520px){.music-label{display:none;}.music-btn{padding:.7rem;}}

/* ---------- MODAL ---------- */
.modal-scrim{position:fixed;inset:0;z-index:80;background:rgba(20,24,22,.55);backdrop-filter:blur(4px);
  display:flex;align-items:flex-end;justify-content:center;animation:fade .3s ease;}
@media(min-width:640px){.modal-scrim{align-items:center;}}
@keyframes fade{from{opacity:0;}to{opacity:1;}}
.modal{background:var(--ivory);width:100%;max-width:460px;border-radius:22px 22px 0 0;
  padding:1.8rem clamp(1.2rem,5vw,2rem) 2.4rem;position:relative;animation:sheet .38s cubic-bezier(.16,.7,.3,1);
  box-shadow:0 -10px 50px rgba(0,0,0,.3);text-align:center;}
@media(min-width:640px){.modal{border-radius:22px;animation:pop .3s ease;}}
@keyframes sheet{from{transform:translateY(100%);}to{transform:none;}}
@keyframes pop{from{transform:scale(.95);opacity:0;}to{transform:none;opacity:1;}}
.modal-x{position:absolute;top:.8rem;right:1rem;background:none;border:none;font-size:1.8rem;
  color:var(--earth);cursor:pointer;line-height:1;}
.modal .display-sm{color:var(--forest);margin-top:.2rem;}
.modal-note{font-size:.76rem;color:var(--moss);margin:.5rem 0 1.4rem;}
.cal-list{display:flex;flex-direction:column;gap:.7rem;text-align:left;}
.cal-item{border:1px solid rgba(107,90,65,.2);border-radius:12px;overflow:hidden;background:var(--paper);}
.cal-head{width:100%;display:flex;align-items:center;justify-content:space-between;gap:1rem;
  background:none;border:none;padding:.95rem 1.1rem;cursor:pointer;text-align:left;}
.cal-title{display:block;font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--forest);}
.cal-sub{display:block;font-size:.76rem;color:var(--earth);margin-top:.1rem;}
.cal-chev{font-size:1.3rem;color:var(--moss);width:20px;text-align:center;}
.cal-actions{display:flex;gap:.5rem;padding:0 1.1rem 1rem;flex-wrap:wrap;}
.cal-a{flex:1;min-width:90px;text-align:center;background:var(--ivory);border:1px solid rgba(44,58,43,.3);
  color:var(--forest);border-radius:8px;padding:.6rem .5rem;font-size:.72rem;letter-spacing:.08em;
  text-transform:uppercase;font-weight:600;cursor:pointer;text-decoration:none;transition:.25s;font-family:inherit;}
.cal-a:hover{background:var(--forest);color:var(--ivory);}

/* ---------- Milky Way (painted) ---------- */
.milkyway{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0;}
.mw-band{position:absolute;top:-14%;left:-25%;width:150%;height:74%;transform:rotate(-20deg);
  filter:blur(7px);opacity:.55;
  background:
    radial-gradient(ellipse 55% 42% at 42% 50%,rgba(196,208,246,.20),transparent 70%),
    radial-gradient(ellipse 46% 30% at 60% 46%,rgba(230,214,196,.14),transparent 72%),
    radial-gradient(ellipse 72% 20% at 50% 52%,rgba(188,204,250,.12),transparent 75%);}
.mw-core{position:absolute;top:0;left:-20%;width:150%;height:46%;transform:rotate(-20deg);
  filter:blur(4px);opacity:.5;
  background:radial-gradient(ellipse 40% 62% at 50% 50%,rgba(215,224,255,.22),transparent 66%);}
.mw-stars span{position:absolute;border-radius:50%;background:#fff;
  box-shadow:0 0 2px rgba(255,255,255,.6);animation:twinkle 3.6s ease-in-out infinite;}
.mw-stars.rm span{animation:none;}
@media (prefers-reduced-motion:reduce){.stars span,.mw-stars span{animation:none;}}

/* ---------- OUR STORY (compact centered poem) ---------- */
.story{position:relative;overflow:hidden;}
.story-inner{position:relative;z-index:2;}
.story .story-intro{margin:1.4rem auto 0;color:var(--earth);}
.beats{position:relative;max-width:460px;margin:2.6rem auto 0;padding-top:.5rem;}
.beats-spine{position:absolute;top:.5rem;bottom:.5rem;left:50%;width:1px;transform:translateX(-50%);
  background:linear-gradient(180deg,transparent,var(--moss) 12%,var(--moss) 88%,transparent);opacity:.55;}
.beat{position:relative;text-align:center;padding:1.2rem 0;}
.beat-dot{display:block;width:8px;height:8px;border-radius:50%;margin:0 auto .8rem;position:relative;z-index:1;
  background:var(--ivory);border:1.5px solid var(--moss);box-shadow:0 0 0 4px rgba(122,133,95,.14);}
.beat-title{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(1.5rem,5vw,2.1rem);
  color:var(--forest);line-height:1.1;}
.beat-body{margin-top:.3rem;color:var(--earth);font-size:.98rem;font-style:italic;
  font-family:'Cormorant Garamond',serif;letter-spacing:.01em;}

/* ---------- time-based ambiance veil (six sets across the day) ---------- */
.ambiance-veil{position:fixed;inset:0;z-index:6;pointer-events:none;mix-blend-mode:soft-light;
  opacity:.42;transition:background 1.2s ease,opacity 1.2s ease;}
.amb-dawn .ambiance-veil{background:linear-gradient(155deg,#ffe1c4,#ffc2c9 55%,#b9c4de);}
.amb-morning .ambiance-veil{background:linear-gradient(155deg,#dfeaf2,#eef2e6 55%,#f3ead6);opacity:.3;}
.amb-midday .ambiance-veil{background:linear-gradient(155deg,#fff0c4,#ffe1a2 55%,#f2e8cf);opacity:.32;}
.amb-afternoon .ambiance-veil{background:linear-gradient(155deg,#ffd487,#ff9f5c 68%,#8a6733);opacity:.4;}
.amb-dusk .ambiance-veil{background:linear-gradient(155deg,#e59a86,#8a5a86 58%,#3a3a63);opacity:.46;}
.amb-night .ambiance-veil{background:linear-gradient(155deg,#2b3b66,#0f1a2e 68%,#05070d);opacity:.52;}
@media (prefers-reduced-motion:reduce){.ambiance-veil{transition:none;}}

:focus-visible{outline:2px solid var(--gold);outline-offset:3px;border-radius:4px;}
